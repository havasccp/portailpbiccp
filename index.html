
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portail Power BI | Havas CCP</title>
    <style>
        /* ============================================
           VARIABLES & RESET
           ============================================ */
        :root {
            --color-bg: #FAFAFA;
            --color-surface: #FFFFFF;
            --color-border: #F0F0F0;
            --color-border-hover: #E5E5E5;
            --color-text-primary: #1A1A1A;
            --color-text-secondary: #6B6B6B;
            --color-text-tertiary: #9B9B9B;
            --color-accent: #0066FF;
            --color-accent-light: #F0F6FF;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
            --shadow-lg: 0 12px 32px rgba(0,0,0,0.08);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --transition-fast: 150ms ease;
            --transition-normal: 250ms ease;
            --font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: var(--font-family);
            background: var(--color-bg);
            color: var(--color-text-primary);
            line-height: 1.5;
            min-height: 100vh;
        }

        /* ============================================
           LAYOUT
           ============================================ */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* ============================================
           HEADER
           ============================================ */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(250, 250, 250, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--color-border);
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 72px;
            gap: 24px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: var(--color-text-primary);
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--color-accent), #0052CC);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 14px;
        }

        .logo-text {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        .logo-text span {
            color: var(--color-text-tertiary);
            font-weight: 400;
        }

        /* ============================================
           SEARCH BAR
           ============================================ */
        .search-wrapper {
            flex: 1;
            max-width: 480px;
        }

        .search-bar {
            position: relative;
            width: 100%;
        }

        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--color-text-tertiary);
            pointer-events: none;
        }

        .search-input {
            width: 100%;
            height: 44px;
            padding: 0 16px 0 48px;
            border: 1px solid var(--color-border);
            border-radius: 22px;
            background: var(--color-surface);
            font-size: 14px;
            font-family: inherit;
            color: var(--color-text-primary);
            transition: all var(--transition-fast);
        }

        .search-input::placeholder {
            color: var(--color-text-tertiary);
        }

        .search-input:focus {
            outline: none;
            border-color: var(--color-accent);
            box-shadow: 0 0 0 3px var(--color-accent-light);
        }

        /* ============================================
           MAIN CONTENT
           ============================================ */
        .main {
            padding: 48px 0 80px;
        }

        .page-header {
            margin-bottom: 40px;
        }

        .page-title {
            font-size: 32px;
            font-weight: 600;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .page-subtitle {
            font-size: 16px;
            color: var(--color-text-secondary);
        }

        /* ============================================
           CATEGORY FILTERS
           ============================================ */
        .filters {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 32px;
            flex-wrap: wrap;
        }

        .filter-btn {
            height: 36px;
            padding: 0 16px;
            border: 1px solid var(--color-border);
            border-radius: 18px;
            background: var(--color-surface);
            font-size: 13px;
            font-family: inherit;
            font-weight: 500;
            color: var(--color-text-secondary);
            cursor: pointer;
            transition: all var(--transition-fast);
            white-space: nowrap;
        }

        .filter-btn:hover {
            border-color: var(--color-border-hover);
            background: var(--color-bg);
        }

        .filter-btn.active {
            background: var(--color-text-primary);
            border-color: var(--color-text-primary);
            color: white;
        }

        .filter-count {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 20px;
            height: 20px;
            padding: 0 6px;
            margin-left: 6px;
            border-radius: 10px;
            background: rgba(0,0,0,0.08);
            font-size: 11px;
            font-weight: 600;
        }

        .filter-btn.active .filter-count {
            background: rgba(255,255,255,0.2);
        }

        /* ============================================
           REPORTS GRID
           ============================================ */
        .reports-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 24px;
        }

        /* ============================================
           REPORT CARD
           ============================================ */
        .report-card {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            cursor: pointer;
            transition: all var(--transition-normal);
            opacity: 0;
            transform: translateY(12px);
            animation: fadeInUp 0.4s ease forwards;
        }

        .report-card:hover {
            border-color: var(--color-border-hover);
            box-shadow: var(--shadow-lg);
            transform: translateY(-4px);
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .report-card:nth-child(1) { animation-delay: 0.05s; }
        .report-card:nth-child(2) { animation-delay: 0.1s; }
        .report-card:nth-child(3) { animation-delay: 0.15s; }
        .report-card:nth-child(4) { animation-delay: 0.2s; }
        .report-card:nth-child(5) { animation-delay: 0.25s; }
        .report-card:nth-child(6) { animation-delay: 0.3s; }
        .report-card:nth-child(7) { animation-delay: 0.35s; }
        .report-card:nth-child(8) { animation-delay: 0.4s; }
        .report-card:nth-child(9) { animation-delay: 0.45s; }
        .report-card:nth-child(10) { animation-delay: 0.5s; }
        .report-card:nth-child(11) { animation-delay: 0.55s; }
        .report-card:nth-child(12) { animation-delay: 0.6s; }

        /* ============================================
           CARD IMAGE / PREVIEW
           ============================================ */
        .card-preview {
            width: 100%;
            height: 160px;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .card-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top left;
            transition: transform var(--transition-normal);
        }

        .report-card:hover .card-preview img {
            transform: scale(1.05);
        }

        .card-preview-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--color-text-tertiary);
            font-size: 13px;
        }

        .card-preview-placeholder svg {
            width: 32px;
            height: 32px;
            margin-bottom: 8px;
            opacity: 0.5;
        }

        /* ============================================
           CARD CONTENT
           ============================================ */
        .card-content {
            padding: 20px;
        }

        .card-category {
            display: inline-block;
            font-size: 11px;
            font-weight: 600;
            color: var(--color-accent);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            letter-spacing: -0.2px;
            margin-bottom: 8px;
            color: var(--color-text-primary);
            line-height: 1.3;
        }

        .card-description {
            font-size: 14px;
            color: var(--color-text-secondary);
            line-height: 1.5;
            margin-bottom: 16px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            min-height: 42px;
        }

        .card-footer {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-top: 16px;
            border-top: 1px solid var(--color-border);
        }

        .card-action {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            font-weight: 500;
            color: var(--color-accent);
            transition: gap var(--transition-fast);
        }

        .report-card:hover .card-action {
            gap: 10px;
        }

        .card-action svg {
            width: 16px;
            height: 16px;
        }

        /* ============================================
           STATS BAR
           ============================================ */
        .stats-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--color-border);
        }

        .stats-text {
            font-size: 13px;
            color: var(--color-text-tertiary);
        }

        .stats-text strong {
            color: var(--color-text-primary);
            font-weight: 600;
        }

        /* ============================================
           EMPTY STATE
           ============================================ */
        .empty-state {
            text-align: center;
            padding: 80px 24px;
            color: var(--color-text-secondary);
        }

        .empty-state-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 24px;
            background: var(--color-bg);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }

        .empty-state-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--color-text-primary);
            margin-bottom: 8px;
        }

        .empty-state-text {
            font-size: 14px;
            max-width: 320px;
            margin: 0 auto;
        }

        /* ============================================
           RESPONSIVE
           ============================================ */
        @media (max-width: 768px) {
            .header-content {
                height: auto;
                padding: 16px 0;
                flex-wrap: wrap;
            }

            .search-wrapper {
                order: 3;
                max-width: 100%;
                width: 100%;
                margin-top: 16px;
            }

            .page-title {
                font-size: 24px;
            }

            .reports-grid {
                grid-template-columns: 1fr;
            }

            .filters {
                overflow-x: auto;
                flex-wrap: nowrap;
                padding-bottom: 8px;
                margin-bottom: 24px;
            }

            .filters::-webkit-scrollbar {
                display: none;
            }

            .main {
                padding: 32px 0 60px;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 0 16px;
            }

            .logo-text span {
                display: none;
            }

            .card-preview {
                height: 140px;
            }
        }
    </style>
</head>
<body>
    <!-- ============================================
         HEADER
         ============================================ -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <a href="#" class="logo">
                    <div class="logo-icon">PBI</div>
                    <div class="logo-text">Power BI <span>Portal</span></div>
                </a>

                <div class="search-wrapper">
                    <div class="search-bar">
                        <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.35-4.35"></path>
                        </svg>
                        <input 
                            type="text" 
                            class="search-input" 
                            id="searchInput"
                            placeholder="Rechercher un rapport..."
                        >
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- ============================================
         MAIN CONTENT
         ============================================ -->
    <main class="main">
        <div class="container">
            <!-- Page Header -->
            <div class="page-header">
                <h1 class="page-title">Tableaux de bord</h1>
                <p class="page-subtitle">Accédez à tous vos rapports Power BI en un clic</p>
            </div>

            <!-- Category Filters -->
            <div class="filters" id="filters">
                <!-- Dynamically generated -->
            </div>

            <!-- Stats Bar -->
            <div class="stats-bar">
                <span class="stats-text" id="statsText">
                    <strong>0</strong> rapports
                </span>
            </div>

            <!-- Reports Grid -->
            <div class="reports-grid" id="reportsGrid">
                <!-- Dynamically generated -->
            </div>

            <!-- Empty State -->
            <div class="empty-state" id="emptyState" style="display: none;">
                <div class="empty-state-icon">🔍</div>
                <h3 class="empty-state-title">Aucun rapport trouvé</h3>
                <p class="empty-state-text">
                    Essayez de modifier vos critères de recherche ou sélectionnez une autre catégorie.
                </p>
            </div>
        </div>
    </main>

    <!-- ============================================
         JAVASCRIPT
         ============================================ -->
    <script>
        /* ============================================
           DONNÉES DES RAPPORTS
           ============================================
           
           Pour ajouter une image :
           1. Faites une capture d'écran du rapport
           2. Uploadez-la dans le dossier "images" sur GitHub
           3. Ajoutez le nom du fichier dans le champ "image"
           
           Exemple : image: "360-solutions.png"
           
        */
        const reports = [
            {
                id: 1,
                title: "360 SOLUTIONS",
                category: "CCP",
                description: "Analyse des litiges déclarés sur Media360.",
                image: "360-solutions.png",
                url: "https://app.powerbi.com/links/GNZ0CrLOGw?ctid=c7ed5557-a5c8-4435-9fab-ada7abcdc01b&pbi_source=linkShare"
            },
            {
                id: 2,
                title: "INV TRACKER",
                category: "CCP",
                description: "Analyse des insertions non validées.",
                image: "inv-tracker.png",
                url: "https://app.powerbi.com/links/NQRk3CeEuy?ctid=c7ed5557-a5c8-4435-9fab-ada7abcdc01b&pbi_source=linkShare"
            },
            {
                id: 3,
                title: "SPOT CHECK",
                category: "CCP",
                description: "Contrôle et vérification des spots.",
                image: "spot-check.png",
                url: "https://app.powerbi.com/links/8QWaMPmVc3?ctid=c7ed5557-a5c8-4435-9fab-ada7abcdc01b&pbi_source=linkShare"
            },
            {
                id: 4,
                title: "ECSELIS BILLING TRACKER",
                category: "Ecselis",
                description: "Suivi de la facturation Ecselis.",
                image: "ecselis-billing.png",
                url: "https://app.powerbi.com/links/wJVKUzZO5y?ctid=c7ed5557-a5c8-4435-9fab-ada7abcdc01b&pbi_source=linkShare"
            },
            {
                id: 5,
                title: "HMK BILLING CONTROL",
                category: "Ecselis",
                description: "Contrôle de facturation HMK.",
                image: "hmk-billing.png",
                url: "https://app.powerbi.com/links/iFR6ZF1Qhi?ctid=c7ed5557-a5c8-4435-9fab-ada7abcdc01b&pbi_source=linkShare"
            },
            {
                id: 6,
                title: "360 SOLUTIONS by Forward",
                category: "Forward",
                description: "Analyse des litiges déclarés sur Media360 sur l'entité Forward.",
                image: "360-forward.png",
                url: "https://app.powerbi.com/links/lmAKEZJLzh?ctid=c7ed5557-a5c8-4435-9fab-ada7abcdc01b&pbi_source=linkShare"
            },
            {
                id: 7,
                title: "INV TRACKER by Forward",
                category: "Forward",
                description: "Analyse des insertions non validées sur l'entité Forward.",
                image: "inv-forward.png",
                url: "https://app.powerbi.com/links/ovZwk8Cq1l?ctid=c7ed5557-a5c8-4435-9fab-ada7abcdc01b&pbi_source=linkShare"
            },
            {
                id: 8,
                title: "LVMH DASHBOARD & REPORTING",
                category: "Forward",
                description: "Tableau de bord et reporting LVMH.",
                image: "lvmh-dashboard.png",
                url: "https://app.powerbi.com/links/9t9EkpX0B9?ctid=c7ed5557-a5c8-4435-9fab-ada7abcdc01b&pbi_source=linkShare"
            },
            {
                id: 9,
                title: "RADAR HPH",
                category: "Havas Programmatic Hub",
                description: "Suivi des actions attendues pour préparer aux mieux la clôture de la régie Havas Programmatic Hub.",
                image: "radar-hph.png",
                url: "https://app.powerbi.com/links/pv25JrrxMO?ctid=c7ed5557-a5c8-4435-9fab-ada7abcdc01b&pbi_source=linkShare"
            },
            {
                id: 10,
                title: "RADAR HPH : Rate Card",
                category: "Havas Programmatic Hub",
                description: "Contrôle de l'application des taux contractuel sur la régie Havas Programmatic Hub.",
                image: "radar-ratecard.png",
                url: "https://app.powerbi.com/links/vB0k7HMYP8?ctid=c7ed5557-a5c8-4435-9fab-ada7abcdc01b&pbi_source=linkShare"
            },
            {
                id: 11,
                title: "SOCFLOW Suivi factu social",
                category: "Havas Programmatic Hub",
                description: "Suivi de la facturation sociale.",
                image: "socflow.png",
                url: "https://app.powerbi.com/links/u0I0r3VBNf?ctid=c7ed5557-a5c8-4435-9fab-ada7abcdc01b&pbi_source=linkShare"
            },
            {
                id: 12,
                title: "BOOK PILOT",
                category: "Pilot",
                description: "Tableau de bord Pilot.",
                image: "book-pilot.png",
                url: "https://app.powerbi.com/links/5Wi066rhml?ctid=c7ed5557-a5c8-4435-9fab-ada7abcdc01b&pbi_source=linkShare"
            }
        ];

        // Base URL pour les images GitHub
        const imageBaseUrl = "https://raw.githubusercontent.com/KevinHilaire1/portailpbiccp/main/images/";

        /* ============================================
           CATEGORIES - Extraites automatiquement
           ============================================ */
        const categories = ["Tous", ...new Set(reports.map(r => r.category))];

        /* ============================================
           STATE
           ============================================ */
        let currentCategory = "Tous";
        let searchQuery = "";

        /* ============================================
           DOM ELEMENTS
           ============================================ */
        const filtersContainer = document.getElementById("filters");
        const reportsGrid = document.getElementById("reportsGrid");
        const searchInput = document.getElementById("searchInput");
        const emptyState = document.getElementById("emptyState");
        const statsText = document.getElementById("statsText");

        /* ============================================
           RENDER FILTERS
           ============================================ */
        function renderFilters() {
            filtersContainer.innerHTML = categories.map(cat => {
                const count = cat === "Tous" 
                    ? reports.length 
                    : reports.filter(r => r.category === cat).length;
                
                return `
                    <button 
                        class="filter-btn ${currentCategory === cat ? 'active' : ''}"
                        data-category="${cat}"
                    >
                        ${cat}
                        <span class="filter-count">${count}</span>
                    </button>
                `;
            }).join("");

            // Add event listeners
            filtersContainer.querySelectorAll(".filter-btn").forEach(btn => {
                btn.addEventListener("click", () => {
                    currentCategory = btn.dataset.category;
                    renderFilters();
                    renderReports();
                });
            });
        }

        /* ============================================
           RENDER REPORTS
           ============================================ */
        function renderReports() {
            // Filter reports
            let filtered = reports.filter(report => {
                const matchesCategory = currentCategory === "Tous" || 
                                       report.category === currentCategory;
                const matchesSearch = searchQuery === "" ||
                    report.title.toLowerCase().includes(searchQuery.toLowerCase()) ||
                    report.description.toLowerCase().includes(searchQuery.toLowerCase()) ||
                    report.category.toLowerCase().includes(searchQuery.toLowerCase());
                
                return matchesCategory && matchesSearch;
            });

            // Update stats
            statsText.innerHTML = `<strong>${filtered.length}</strong> rapport${filtered.length > 1 ? 's' : ''}`;

            // Show/hide empty state
            if (filtered.length === 0) {
                reportsGrid.style.display = "none";
                emptyState.style.display = "block";
                return;
            } else {
                reportsGrid.style.display = "grid";
                emptyState.style.display = "none";
            }

            // Render cards
            reportsGrid.innerHTML = filtered.map((report, index) => {
                const imageUrl = report.image ? imageBaseUrl + report.image : null;
                
                return `
                    <article 
                        class="report-card" 
                        data-id="${report.id}"
                        style="animation-delay: ${index * 0.05}s"
                        onclick="openReport('${report.url}')"
                    >
                        <div class="card-preview">
                            ${imageUrl ? 
                                `<img src="${imageUrl}" alt="${report.title}" onerror="this.parentElement.innerHTML='<div class=\\'card-preview-placeholder\\'><svg viewBox=\\'0 0 24 24\\' fill=\\'none\\' stroke=\\'currentColor\\' stroke-width=\\'1.5\\'><rect x=\\'3\\' y=\\'3\\' width=\\'18\\' height=\\'18\\' rx=\\'2\\'/><path d=\\'M9 9h6v6H9z\\'/><path d=\\'M9 3v6M15 3v6M9 15v6M15 15v6M3 9h6M3 15h6M15 9h6M15 15h6\\'/></svg>Aperçu non disponible</div>'">` 
                                : 
                                `<div class="card-preview-placeholder">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                        <rect x="3" y="3" width="18" height="18" rx="2"/>
                                        <path d="M9 9h6v6H9z"/>
                                        <path d="M9 3v6M15 3v6M9 15v6M15 15v6M3 9h6M3 15h6M15 9h6M15 15h6"/>
                                    </svg>
                                    Aperçu non disponible
                                </div>`
                            }
                        </div>
                        
                        <div class="card-content">
                            <span class="card-category">${report.category}</span>
                            <h3 class="card-title">${report.title}</h3>
                            <p class="card-description">${report.description}</p>
                            
                            <div class="card-footer">
                                <span class="card-action">
                                    Ouvrir le rapport
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M5 12h14M12 5l7 7-7 7"/>
                                    </svg>
                                </span>
                            </div>
                        </div>
                    </article>
                `;
            }).join("");
        }

        /* ============================================
           OPEN REPORT
           ============================================ */
        function openReport(url) {
            window.open(url, '_blank');
        }

        /* ============================================
           SEARCH HANDLER
           ============================================ */
        searchInput.addEventListener("input", (e) => {
            searchQuery = e.target.value;
            renderReports();
        });

        /* ============================================
           KEYBOARD SHORTCUT
           ============================================ */
        document.addEventListener("keydown", (e) => {
            // Cmd/Ctrl + K pour focus sur la recherche
            if ((e.metaKey || e.ctrlKey) && e.key === "k") {
                e.preventDefault();
                searchInput.focus();
            }
        });

        /* ============================================
           INIT
           ============================================ */
        function init() {
            renderFilters();
            renderReports();
        }

        // Start the app
        init();
    </script>
</body>
</html>
